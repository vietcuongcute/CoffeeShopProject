services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: coffeeshop_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong@Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - coffeeshop_sqlserver_data:/var/opt/mssql
    restart: unless-stopped

volumes:
  coffeeshop_sqlserver_data:
